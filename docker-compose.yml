services:
  db:
    image: postgres:16
    container_name: comment-data-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-comment_data}
      POSTGRES_USER: ${POSTGRES_USER:-comment_data}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-comment_data_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-comment_data} -d ${POSTGRES_DB:-comment_data}"]
      interval: 5s
      timeout: 5s
      retries: 10

  collector:
    build:
      context: .
    profiles:
      - tools
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-comment_data}:${POSTGRES_PASSWORD:-comment_data_password}@db:5432/${POSTGRES_DB:-comment_data}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_SUMMARY_MODEL: ${OPENAI_SUMMARY_MODEL:-gpt-5.2}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5175,http://127.0.0.1:5175,http://localhost:8080,http://127.0.0.1:8080,https://techocon-web-vercel.vercel.app}
    volumes:
      - ./missions.yml:/app/missions.yml:ro
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-comment_data}:${POSTGRES_PASSWORD:-comment_data_password}@db:5432/${POSTGRES_DB:-comment_data}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_SUMMARY_MODEL: ${OPENAI_SUMMARY_MODEL:-gpt-5.2}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./comment_data:/app/comment_data:ro
    entrypoint: ["uvicorn"]
    command: ["comment_data.api:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
